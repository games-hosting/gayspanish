<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Aprende Español! — Spanish Learning Game</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1928;
    --card: #22213a;
    --accent: #ff6b35;
    --accent2: #ffd166;
    --accent3: #06d6a0;
    --accent4: #118ab2;
    --text: #fffffe;
    --muted: #a8a7c0;
    --wrong: #ef233c;
    --right: #06d6a0;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 60% 40% at 10% 20%, rgba(255,107,53,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 90% 80%, rgba(6,214,160,0.1) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(17,138,178,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 24px 20px;
    position: relative;
    z-index: 1;
  }

  /* ===== HEADER ===== */
  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -1px;
    line-height: 1;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ===== SCORE BAR ===== */
  .scorebar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
    border-radius: 50px;
    padding: 10px 20px;
    margin-bottom: 24px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .score-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
    color: var(--muted);
  }

  .score-item strong {
    color: var(--text);
    font-size: 1rem;
  }

  .score-item .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  /* ===== TOPIC GRID ===== */
  #screen-topics {
    animation: fadeUp 0.5s ease;
  }

  .topics-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    margin-bottom: 4px;
  }

  .topics-sub {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 20px;
  }

  .topic-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }

  .topic-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px 18px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.06);
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .topic-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .topic-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
  .topic-card:hover::before { opacity: 1; }

  .topic-card.c0::before { background: linear-gradient(135deg, rgba(255,107,53,0.12), transparent); }
  .topic-card.c1::before { background: linear-gradient(135deg, rgba(255,209,102,0.12), transparent); }
  .topic-card.c2::before { background: linear-gradient(135deg, rgba(6,214,160,0.12), transparent); }
  .topic-card.c3::before { background: linear-gradient(135deg, rgba(17,138,178,0.12), transparent); }
  .topic-card:hover { border-color: rgba(255,255,255,0.15); }

  .topic-emoji { font-size: 1.8rem; margin-bottom: 8px; }
  .topic-name {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.2;
  }

  .topic-count {
    color: var(--muted);
    font-size: 0.75rem;
    margin-top: 4px;
  }

  /* ===== QUIZ SCREEN ===== */
  #screen-quiz { display: none; animation: fadeUp 0.5s ease; }

  .quiz-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
  }

  .back-btn {
    background: var(--surface);
    border: none;
    color: var(--muted);
    width: 38px; height: 38px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s, background 0.2s;
    flex-shrink: 0;
  }

  .back-btn:hover { color: var(--text); background: var(--card); }

  .quiz-topic-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
  }

  .progress-bar-wrap {
    background: var(--surface);
    border-radius: 50px;
    height: 6px;
    flex: 1;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 50px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s ease;
  }

  /* Mode toggle */
  .mode-toggle {
    display: flex;
    background: var(--surface);
    border-radius: 50px;
    padding: 4px;
    margin-bottom: 20px;
    width: fit-content;
    gap: 4px;
  }

  .mode-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 7px 16px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 0.82rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    transition: all 0.2s;
  }

  .mode-btn.active {
    background: var(--accent);
    color: white;
  }

  /* Question card */
  .question-card {
    background: var(--card);
    border-radius: 20px;
    padding: 32px 28px;
    margin-bottom: 20px;
    border: 1px solid rgba(255,255,255,0.06);
    min-height: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .question-label {
    color: var(--muted);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  .question-text {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 700;
    line-height: 1.2;
    background: linear-gradient(135deg, var(--text), var(--muted));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .question-hint {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 10px;
  }

  /* Answers */
  .answers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .answer-btn {
    background: var(--surface);
    border: 2px solid rgba(255,255,255,0.07);
    color: var(--text);
    border-radius: var(--radius);
    padding: 16px 14px;
    cursor: pointer;
    font-size: 0.95rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    transition: all 0.18s;
    text-align: center;
    line-height: 1.3;
  }

  .answer-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(255,107,53,0.1);
    transform: translateY(-2px);
  }

  .answer-btn.correct {
    border-color: var(--right);
    background: rgba(6,214,160,0.15);
    color: var(--right);
  }

  .answer-btn.wrong {
    border-color: var(--wrong);
    background: rgba(239,35,60,0.15);
    color: var(--wrong);
  }

  /* Input mode */
  .input-wrap {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .answer-input {
    flex: 1;
    background: var(--surface);
    border: 2px solid rgba(255,255,255,0.07);
    border-radius: var(--radius);
    color: var(--text);
    padding: 14px 18px;
    font-size: 1rem;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .answer-input:focus { border-color: var(--accent); }
  .answer-input.correct { border-color: var(--right); background: rgba(6,214,160,0.1); }
  .answer-input.wrong { border-color: var(--wrong); background: rgba(239,35,60,0.1); }

  .submit-btn {
    background: var(--accent);
    border: none;
    color: white;
    border-radius: var(--radius);
    padding: 14px 24px;
    font-size: 1rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }

  .submit-btn:hover { transform: scale(1.03); }
  .submit-btn:active { transform: scale(0.97); }

  /* Feedback */
  .feedback-box {
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 16px;
    font-weight: 500;
    font-size: 0.95rem;
    display: none;
    align-items: center;
    gap: 10px;
  }

  .feedback-box.show { display: flex; }
  .feedback-box.ok { background: rgba(6,214,160,0.12); border: 1px solid rgba(6,214,160,0.3); color: var(--right); }
  .feedback-box.bad { background: rgba(239,35,60,0.12); border: 1px solid rgba(239,35,60,0.3); color: var(--wrong); }

  .next-btn {
    display: block;
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #ff8c42);
    border: none;
    color: white;
    border-radius: var(--radius);
    padding: 16px;
    font-size: 1rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    display: none;
  }

  .next-btn.show { display: block; }
  .next-btn:hover { opacity: 0.9; transform: scale(1.01); }

  /* ===== RESULTS ===== */
  #screen-results { display: none; animation: fadeUp 0.5s ease; }

  .results-card {
    background: var(--card);
    border-radius: 24px;
    padding: 40px 32px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 20px;
  }

  .results-emoji { font-size: 3.5rem; margin-bottom: 16px; }
  .results-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    margin-bottom: 8px;
  }

  .results-score {
    font-size: 3.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 10px 0;
  }

  .results-sub { color: var(--muted); font-size: 0.9rem; }

  .results-actions {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    justify-content: center;
  }

  .results-btn {
    background: var(--accent);
    border: none;
    color: white;
    border-radius: var(--radius);
    padding: 14px 28px;
    font-size: 0.95rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .results-btn.secondary {
    background: var(--surface);
    color: var(--text);
  }

  .results-btn:hover { transform: scale(1.03); }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  .pop { animation: pop 0.25s ease; }

  /* Stars */
  .stars {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 12px 0;
    font-size: 1.8rem;
  }

  @media (max-width: 500px) {
    .logo { font-size: 2rem; }
    .question-text { font-size: 1.6rem; }
    .answers-grid { grid-template-columns: 1fr; }
    .topic-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">¡Aprende Español!</div>
    <div class="subtitle">Spanish Learning Game</div>
  </header>

  <div class="scorebar">
    <div class="score-item">
      <div class="dot" style="background:var(--accent2)"></div>
      Score: <strong id="total-score">0</strong>
    </div>
    <div class="score-item">
      🔥 Streak: <strong id="streak">0</strong>
    </div>
    <div class="score-item">
      ✅ Correct: <strong id="total-correct">0</strong>
    </div>
  </div>

  <!-- TOPIC SELECTION -->
  <div id="screen-topics">
    <div class="topics-title">Choose a Topic</div>
    <div class="topics-sub">What do you want to practice today?</div>
    <div class="topic-grid" id="topic-grid"></div>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz">
    <div class="quiz-header">
      <button class="back-btn" onclick="showTopics()">←</button>
      <div class="quiz-topic-name" id="quiz-title"></div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <span id="q-counter" style="color:var(--muted);font-size:0.8rem;flex-shrink:0">0/10</span>
    </div>

    <div class="mode-toggle">
      <button class="mode-btn active" onclick="setMode('mc')" id="btn-mc">Multiple Choice</button>
      <button class="mode-btn" onclick="setMode('type')" id="btn-type">Type It</button>
    </div>

    <div class="question-card">
      <div class="question-label" id="q-label">Translate to English</div>
      <div class="question-text" id="q-text">—</div>
      <div class="question-hint" id="q-hint"></div>
    </div>

    <div id="mc-section">
      <div class="answers-grid" id="answers-grid"></div>
    </div>

    <div id="type-section" style="display:none">
      <div class="input-wrap">
        <input class="answer-input" id="answer-input" type="text" placeholder="Type your answer…" autocomplete="off">
        <button class="submit-btn" onclick="submitTyped()">Check</button>
      </div>
    </div>

    <div class="feedback-box" id="feedback-box">
      <span id="feedback-icon">✓</span>
      <span id="feedback-text"></span>
    </div>

    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question →</button>
  </div>

  <!-- RESULTS -->
  <div id="screen-results">
    <div class="results-card">
      <div class="results-emoji" id="r-emoji">🎉</div>
      <div class="results-title" id="r-title">¡Excelente!</div>
      <div class="stars" id="r-stars"></div>
      <div class="results-score" id="r-score">8/10</div>
      <div class="results-sub" id="r-sub">You got 8 out of 10 correct!</div>
      <div class="results-actions">
        <button class="results-btn" onclick="retryTopic()">Try Again</button>
        <button class="results-btn secondary" onclick="showTopics()">All Topics</button>
      </div>
    </div>
  </div>

</div>

      ['a','ah'],['b','beh'],['c','seh'],['d','deh'],['e','eh'],['f','efeh'],
      ['g','heh'],['h','acheh'],['i','ee'],['j','hotah'],['k','kah'],['l','eleh'],
      ['m','emeh'],['n','eneh'],['ñ','enyeh'],['o','oh'],['p','peh'],['q','koo'],
      ['r','erreh'],['s','eseh'],['t','teh'],['u','oo'],['v','veh / uveh'],
      ['x','ekees'],['y','ee gryegah'],['z','seta'],
    ]
  },
];

// ===================== STATE =====================
let currentTopic = null;
let currentMode = 'mc';
let queuePairs = [];
let currentPair = null;
let qIndex = 0;
let qTotal = 10;
let score = 0;
let streak = 0;
let totalScore = 0;
let totalCorrect = 0;
let answered = false;

// ===================== INIT =====================
function buildTopicGrid() {
  const grid = document.getElementById('topic-grid');
  grid.innerHTML = '';
  topics.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = `topic-card c${t.color}`;
    card.innerHTML = `
      <div class="topic-emoji">${t.emoji}</div>
      <div class="topic-name">${t.name}</div>
      <div class="topic-count">${t.pairs.length} words · ${t.subtitle}</div>
    `;
    card.onclick = () => startTopic(t);
    grid.appendChild(card);
  });
}

// ===================== TOPIC / QUIZ =====================
function showTopics() {
  document.getElementById('screen-topics').style.display = 'block';
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('screen-results').style.display = 'none';
}

function startTopic(topic) {
  currentTopic = topic;
  score = 0;
  qIndex = 0;
  qTotal = Math.min(10, topic.pairs.length);
  queuePairs = shuffle([...topic.pairs]).slice(0, qTotal);
  document.getElementById('quiz-title').textContent = `${topic.emoji} ${topic.name}`;
  document.getElementById('screen-topics').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'block';
  document.getElementById('screen-results').style.display = 'none';
  updateProgress();
  nextQuestion();
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-mc').classList.toggle('active', mode === 'mc');
  document.getElementById('btn-type').classList.toggle('active', mode === 'type');
  document.getElementById('mc-section').style.display = mode === 'mc' ? 'block' : 'none';
  document.getElementById('type-section').style.display = mode === 'type' ? 'block' : 'none';
}

function updateProgress() {
  const pct = (qIndex / qTotal) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-counter').textContent = `${qIndex}/${qTotal}`;
}

function nextQuestion() {
  if (qIndex >= qTotal) {
    showResults();
    return;
  }

  answered = false;
  hideFeedback();
  document.getElementById('next-btn').classList.remove('show');

  currentPair = queuePairs[qIndex];
  // Randomly ask ES→EN or EN→ES
  const dir = Math.random() > 0.5 ? 'es-en' : 'en-es';
  const question = dir === 'es-en' ? currentPair[0] : currentPair[1];
  const answer = dir === 'es-en' ? currentPair[1] : currentPair[0];
  const label = dir === 'es-en' ? 'Translate to English' : 'Translate to Spanish';

  document.getElementById('q-label').textContent = label;
  document.getElementById('q-text').textContent = question;
  document.getElementById('q-hint').textContent = '';

  // Store correct answer on window for checking
  window._correctAnswer = answer;
  window._questionDir = dir;

  if (currentMode === 'mc') {
    buildMCAnswers(answer, dir);
  } else {
    const inp = document.getElementById('answer-input');
    inp.value = '';
    inp.className = 'answer-input';
    inp.focus();
  }

  updateProgress();
}

function buildMCAnswers(correctAnswer, dir) {
  const grid = document.getElementById('answers-grid');
  grid.innerHTML = '';

  // Get 3 wrong answers from other pairs
  const others = currentTopic.pairs
    .filter(p => p !== currentPair)
    .map(p => dir === 'es-en' ? p[1] : p[0]);
  const wrongs = shuffle(others).slice(0, 3);
  const allAnswers = shuffle([correctAnswer, ...wrongs]);

  allAnswers.forEach(ans => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = ans;
    btn.onclick = () => checkMC(btn, ans, correctAnswer);
    grid.appendChild(btn);
  });
}

function checkMC(btn, chosen, correct) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.answer-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
  });

  if (chosen === correct) {
    btn.classList.add('correct');
    handleCorrect();
  } else {
    btn.classList.add('wrong');
    handleWrong(correct);
  }

  document.getElementById('next-btn').classList.add('show');
  qIndex++;
}

function submitTyped() {
  if (answered) return;
  const inp = document.getElementById('answer-input');
  const typed = inp.value.trim().toLowerCase();
  const correct = window._correctAnswer.toLowerCase();

  if (!typed) return;
  answered = true;

  // Allow minor accent mistakes
  const normalize = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
  const ok = normalize(typed) === normalize(correct) || typed === correct;

  if (ok) {
    inp.className = 'answer-input correct';
    handleCorrect();
  } else {
    inp.className = 'answer-input wrong';
    handleWrong(window._correctAnswer);
  }

  document.getElementById('next-btn').classList.add('show');
  qIndex++;
}

document.getElementById('answer-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitTyped();
});

function handleCorrect() {
  score++;
  streak++;
  totalCorrect++;
  const bonus = streak >= 3 ? Math.floor(streak / 3) : 0;
  totalScore += 10 + bonus;
  updateScorebar();
  showFeedback(true, streak >= 3 ? `¡Perfecto! 🔥 ${streak} streak! +${10+bonus} pts` : '¡Correcto! ✓');
  document.getElementById('q-text').classList.add('pop');
  setTimeout(() => document.getElementById('q-text').classList.remove('pop'), 300);
}

function handleWrong(correct) {
  streak = 0;
  updateScorebar();
  showFeedback(false, `The answer was: "${correct}"`);
}

function showFeedback(ok, msg) {
  const box = document.getElementById('feedback-box');
  const icon = document.getElementById('feedback-icon');
  const text = document.getElementById('feedback-text');
  box.className = 'feedback-box show ' + (ok ? 'ok' : 'bad');
  icon.textContent = ok ? '✓' : '✗';
  text.textContent = msg;
}

function hideFeedback() {
  document.getElementById('feedback-box').className = 'feedback-box';
}

function updateScorebar() {
  document.getElementById('total-score').textContent = totalScore;
  document.getElementById('streak').textContent = streak;
  document.getElementById('total-correct').textContent = totalCorrect;
}

// ===================== RESULTS =====================
function showResults() {
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('screen-results').style.display = 'block';

  const pct = score / qTotal;
  let emoji, title;
  let stars = Math.round(pct * 3);

  if (pct === 1) { emoji = '🏆'; title = '¡Perfecto!'; }
  else if (pct >= 0.7) { emoji = '🌟'; title = '¡Muy bien!'; }
  else if (pct >= 0.5) { emoji = '😊'; title = '¡Bien hecho!'; }
  else { emoji = '💪'; title = 'Keep practicing!'; }

  document.getElementById('r-emoji').textContent = emoji;
  document.getElementById('r-title').textContent = title;
  document.getElementById('r-score').textContent = `${score}/${qTotal}`;
  document.getElementById('r-sub').textContent = `You got ${score} out of ${qTotal} correct in ${currentTopic.name}!`;
  document.getElementById('r-stars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
}

function retryTopic() {
  startTopic(currentTopic);
}

// ===================== UTILS =====================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ===================== BOOT =====================
buildTopicGrid();
</script>
</body>
</html>
